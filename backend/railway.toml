[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# ./start.sh dispatches to the API or the Celery worker based on SERVICE_ROLE,
# so the API and worker services can share this one config. No healthcheck here
# because the worker serves no HTTP (the API's /health still works regardless).
startCommand = "./start.sh"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
