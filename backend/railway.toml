[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# ./start.sh dispatches to API or Celery worker via SERVICE_ROLE, so this one
# config serves both services. No healthcheck: the worker serves no HTTP (the
# API's /health endpoint still works, it's just not used as a deploy gate).
startCommand = "./start.sh"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
